<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflex: 16-Bit Reaction Timer</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <div id="rotate-message">
        <p>🔄 Please rotate your device to landscape mode to play Reflex!</p>
    </div>

    <div class="click-area" id="game-screen">
        <div class="rank-overlay" id="rank-display">
            <h1 id="result-text">Welcome. Click to start the game!</h1>
        </div>
    </div>

    <div class="recent-scores">
        <h2>Recent Rounds</h2>
        <ul id="score-list">
            <li class="score">-</li>
            <li class="score">-</li>
            <li class="score">-</li>
            <li class="score">-</li>
            <li class="score">-</li>
        </ul>
    </div>

    <script src="main.js"></script>
</body>
</html>
